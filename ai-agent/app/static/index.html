<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Security Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; font-weight: 500; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: #4f8ef7;
      background: #1a1f2e;
    }
    .upload-zone .icon { font-size: 40px; margin-bottom: 12px; }
    .upload-zone p { color: #888; font-size: 14px; }
    .upload-zone .filename { color: #4f8ef7; margin-top: 8px; font-size: 13px; }
    #fileInput { display: none; }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    select, input[type=number] {
      background: #1e2130;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
    }
    button#runBtn {
      background: #4f8ef7;
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button#runBtn:hover { background: #3a7adf; }
    button#runBtn:disabled { background: #333; cursor: not-allowed; }

    /* Status */
    .status-box {
      background: #1e2130;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      display: none;
    }
    .status-box .label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #333;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge.running { background: #1a3a6e; color: #4f8ef7; }
    .badge.done    { background: #0d3320; color: #3dca7e; }
    .badge.error   { background: #3a1010; color: #e05555; }

    /* Summary */
    .summary { font-size: 14px; color: #b0b0b0; line-height: 1.6; }

    /* Test plan table */
    .result-section { display: none; }
    .result-section h2 {
      font-size: 16px; font-weight: 500;
      margin-bottom: 14px; color: #fff;
    }
    .plan-card {
      background: #1e2130;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 3px solid #4f8ef7;
    }
    .plan-card .endpoint {
      font-size: 13px; font-family: monospace;
      color: #4f8ef7; margin-bottom: 6px;
    }
    .plan-card .vuln-type {
      display: inline-block;
      background: #2a1a00;
      color: #f0a030;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .step {
      font-size: 12px;
      color: #999;
      padding: 6px 0;
      border-top: 1px solid #2a2d3e;
    }
    .step strong { color: #ccc; }

    /* Download btn */
    #downloadBtn {
      display: none;
      background: #1e2130;
      border: 1px solid #4f8ef7;
      color: #4f8ef7;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 16px;
    }
    #downloadBtn:hover { background: #1a2540; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔐 API Security Tester</h1>
  <p class="subtitle">Tự động kiểm thử bảo mật API theo OWASP API Top 10</p>

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <div class="icon">📄</div>
    <p>Kéo thả file OpenAPI/Swagger vào đây</p>
    <p>hoặc <strong style="color:#4f8ef7">click để chọn file</strong></p>
    <p style="margin-top:8px;font-size:12px">Hỗ trợ: .yaml, .yml, .json</p>
    <div class="filename" id="fileName"></div>
    <input type="file" id="fileInput" accept=".yaml,.yml,.json">
  </div>

  <!-- Controls -->
  <div class="controls">
    <select id="phaseSelect">
      <option value="phase1">Phase 1 — Recon + Planning</option>
      <option value="full">Full Pipeline (5 agents)</option>
    </select>
    <input type="number" id="maxIter" value="5" min="1" max="10"
           title="Số vòng lặp tối đa">
    <button id="runBtn" disabled>▶ Chạy phân tích</button>
  </div>

  <!-- Status box -->
  <div class="status-box" id="statusBox">
    <div class="label">Trạng thái</div>
    <div class="status-row">
      <div class="spinner" id="spinner"></div>
      <span class="badge running" id="statusBadge">Đang chạy...</span>
    </div>
    <div class="summary" id="summaryText"></div>
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <h2>📋 Test Plan sinh ra</h2>
    <div id="planCards"></div>
    <button id="downloadBtn">⬇ Tải test_plan.json</button>
  </div>
</div>

<script>
  let currentSessionId = null;
  let pollingTimer = null;
  let selectedFile = null;

  // ── Upload zone ─────────────────────────────────────────────────────
  const uploadZone = document.getElementById("uploadZone");
  const fileInput  = document.getElementById("fileInput");
  const fileName   = document.getElementById("fileName");
  const runBtn     = document.getElementById("runBtn");

  uploadZone.addEventListener("click", () => fileInput.click());

  uploadZone.addEventListener("dragover", e => {
    e.preventDefault();
    uploadZone.classList.add("dragover");
  });
  uploadZone.addEventListener("dragleave", () => {
    uploadZone.classList.remove("dragover");
  });
  uploadZone.addEventListener("drop", e => {
    e.preventDefault();
    uploadZone.classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });

  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  function setFile(file) {
    selectedFile = file;
    fileName.textContent = `✓ ${file.name}`;
    runBtn.disabled = false;
  }

  // ── Chạy phân tích ──────────────────────────────────────────────────
  runBtn.addEventListener("click", async () => {
    if (!selectedFile) return;

    const phase   = document.getElementById("phaseSelect").value;
    const maxIter = document.getElementById("maxIter").value;

    // Reset UI
    document.getElementById("statusBox").style.display = "block";
    document.getElementById("resultSection").style.display = "none";
    document.getElementById("planCards").innerHTML = "";
    document.getElementById("downloadBtn").style.display = "none";
    setStatus("running", "Đang phân tích...");
    runBtn.disabled = true;

    // Gửi file lên server
    const formData = new FormData();
    formData.append("file", selectedFile);

    try {
      const res = await fetch(
        `/api/agent/analyze?phase=${phase}&max_iter=${maxIter}`,
        { method: "POST", body: formData }
      );
      const data = await res.json();
      currentSessionId = data.session_id;

      // Bắt đầu polling mỗi 3 giây
      pollingTimer = setInterval(pollResult, 3000);

    } catch (err) {
      setStatus("error", "Không kết nối được server: " + err.message);
      runBtn.disabled = false;
    }
  });

  // ── Polling ─────────────────────────────────────────────────────────
  async function pollResult() {
    if (!currentSessionId) return;
    try {
      const res  = await fetch(`/api/agent/result/${currentSessionId}`);
      const data = await res.json();

      if (data.status === "done") {
        clearInterval(pollingTimer);
        setStatus("done",
          `Tìm thấy ${data.endpoints_found} endpoint có nguy cơ. ` +
          `Sinh ${data.test_plan?.length || 0} test case.`
        );
        renderTestPlan(data.test_plan || []);
        runBtn.disabled = false;

        // Hiện nút download
        const dlBtn = document.getElementById("downloadBtn");
        dlBtn.style.display = "inline-block";
        dlBtn.onclick = () => {
          window.location.href = `/api/agent/download/${currentSessionId}`;
        };

      } else if (data.status === "error") {
        clearInterval(pollingTimer);
        setStatus("error", "Lỗi: " + data.error);
        runBtn.disabled = false;
      }
      // status === "running" → tiếp tục poll

    } catch (err) {
      clearInterval(pollingTimer);
      setStatus("error", "Mất kết nối khi polling");
      runBtn.disabled = false;
    }
  }

  // ── Render test plan ────────────────────────────────────────────────
  function renderTestPlan(plan) {
    const section = document.getElementById("resultSection");
    const cards   = document.getElementById("planCards");
    section.style.display = "block";

    if (plan.length === 0) {
      cards.innerHTML = "<p style='color:#888'>Không sinh được test case nào.</p>";
      return;
    }

    cards.innerHTML = plan.map(item => `
      <div class="plan-card">
        <div class="endpoint">${item.method} ${item.endpoint}</div>
        <span class="vuln-type">${item.vuln_type}</span>
        ${(item.test_steps || []).map((step, i) => `
          <div class="step">
            <strong>Bước ${step.step || i+1}:</strong>
            ${step.description}
            ${step.expected_indicator
              ? `<br><span style="color:#666">→ Dấu hiệu: ${step.expected_indicator}</span>`
              : ""}
          </div>
        `).join("")}
      </div>
    `).join("");
  }

  // ── Cập nhật UI trạng thái ──────────────────────────────────────────
  function setStatus(status, message) {
    const badge   = document.getElementById("statusBadge");
    const spinner = document.getElementById("spinner");
    const summary = document.getElementById("summaryText");

    badge.className = `badge ${status}`;
    badge.textContent = {
      running: "Đang chạy...",
      done:    "Hoàn thành",
      error:   "Lỗi"
    }[status];

    spinner.style.display = status === "running" ? "block" : "none";
    summary.textContent = message;
  }
</script>
</body>
</html>
